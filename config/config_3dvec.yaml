experiment_name: train
description: overfitting 2 shapes 
logging_root: results_3dvec
num_samples: 100000
training:
  num_epochs: 10000
  num_batch_val: 1
  val_type: 1
  epochs_til_ckpt : 3000
  steps_til_summary : 50
  epochs_til_showval: 50
  clip_grad: False
  resume: False
  optim:
    type: Adam
    lr: 0.01
    factor: 0.99
    patience: 20
    lr_scheduler: ROP
    beta1: 0.9
    beta2: 0.999
    amsgrad: False
  resume_data:
    checkpoint_path: train/checkpoints
    checkpoint: '42000'

dataset:
  root: /fast/pselvaraju/Oktopus/Pack50Dataset 
  type: NGCDataset
  num_batch: 5
  file_name: sdf_samples.pkl
  n_sample: 1024
  n_surface_sample: 2048

model:
  type: NGCNet
  # n_curve is a number larger than the total curve counts in dataset
  device: 'cuda'
  n_curve: 300
  curvecode_dim: 256
  curvefeature_dim: 256
  num_pos_encoding: 24
  encoder_curve:
    layers: [256, 256, 256, 256]
    activation_type: silu
  decoder_curve:
    layers: [768, 512, 256, 256, 256, 1]
    activation_type: silu
  shape_model: kl_d512_m512_l8
  surface_point_size: 2048
  
loss:
  sdf_loss:
    enable: True
    factor: 1
    metric: L1

  code_loss:
    enable: True
    factor: 0.0001
    metric: L2

  kl_loss:
    enable: True
    factor: 0.001
    metric: L2

val_loss:
  sdf_loss:
    enable: True
    factor: 1
    metric: L1

  code_loss:
    enable: True
    factor: 0.0001
    metric: L2

  kl_loss:
    enable: True
    factor: 0.001
    metric: L2
