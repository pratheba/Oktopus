experiment_name: train
description: overfitting 2 shapes 
logging_root: results_resume
training:
  num_epochs: 10000
  num_batch_val: 1
  val_type: None
  epochs_til_ckpt : 3000
  steps_til_summary : 50
  epochs_til_showval: 50
  clip_grad: False
  resume: True
  optim:
    type: Adam
    lr: 0.0001
    factor: 0.99
    patience: 20
    lr_scheduler: ROP
    beta1: 0.9
    beta2: 0.999
    amsgrad: False
  resume_data:
    checkpoint_path: /fast/pselvaraju/Oktopus/results/train/
    checkpoint: 'best_model_eval.pth'

dataset:
  root: Pack50Dataset 
  type: NGCDataset
  num_batch: 8
  file_name: sdf_samples.pkl
  n_sample: 128

model:
  type: NGCNet
  # n_curve is a number larger than the total curve counts in dataset

  curve:
    n_curve: 300
    dim_code: 256
    dim_feat: 256

  surface:
    learn_posenc: True
    num_pos_encoding: 32
    query_dim: 512 
    context_dim: 1024
    heads: 6
    head_dim: 64
    num_latents: 1024
    queries_dim: 1024
    depth: 24
    output_dim: 1

  encoder_curve:
    size: [256, 256, 256, 256]
    activation_type: silu
  decoder_curve:
    size: [259, 256, 256, 256, 256, 1]
    activation_type: silu
  
loss:
  sdf_loss:
    enable: True
    factor: 1
    metric: L1

  code_loss:
    enable: True
    factor: 0.0001
    metric: L2

val_loss:
  sdf_loss:
    enable: True
    factor: 1
    metric: L1
  code_loss:
    enable: True
    factor: 0.0001
    metric: L2
