experiment_name: train
description: overfitting 2 shapes 
logging_root: results1
training:
  num_epochs: 10000
  num_batch_val: 1
  val_type: 1
  epochs_til_ckpt : 3000
  steps_til_summary : 50
  epochs_til_showval: 50
  clip_grad: False
  optim:
    type: Adam
    lr: 0.0001
    factor: 0.999
    patience: 10
    lr_scheduler: ROP
    beta1: 0.9
    beta2: 0.999
    amsgrad: False

dataset:
  root: /fast/pselvaraju/Oktopus/Pack50Dataset 
  type: NGCDataset
  num_batch: 5
  file_name: sdf_samples.pkl
  n_sample: 40000

model:
  type: NGCNet
  # n_curve is a number larger than the total curve counts in dataset
  n_curve: 300
  dim_code: 256
  dim_feat: 256
  num_pos_encoding: 24
  encoder_curve:
    size: [256, 256, 256, 256]
    activation_type: silu
  decoder_curve:
    size: [259, 256, 256, 256, 256, 1]
    activation_type: silu
  
loss:
  sdf_loss:
    enable: True
    factor: 1
    metric: L1

  code_loss:
    enable: True
    factor: 0.0001
    metric: L2

val_loss:
  sdf_loss:
    enable: True
    factor: 1
    metric: L1
  code_loss:
    enable: True
    factor: 0.0001
    metric: L2
