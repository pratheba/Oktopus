- target_key: trex_9_v1|body
  accessory_key: dress_2_v1|top
  mode: direct
  cache_as: dress_2_v1|top
  src_0: 0.0
  src_1: 0.6
  tgt_0: 0.0
  tgt_1: 0.5
  scale: 0.7
  rot_deg: 0.0
  wrap_radius: true
  rigid_radius: false
  # Optional smoothing of runtime support
  smooth_accessory_adapt_fields: false
  accessory_adapt_smooth_points_sigma: 1.0
  accessory_adapt_smooth_radius_sigma: 1.0
  accessory_adapt_rebuild_frames: true
  smooth_avatar_adapt_fields: false 
  avatar_adapt_smooth_points_sigma: 1.0
  avatar_adapt_smooth_coords_sigma: 1.0
  # Runtime UV-center correction.
  use_src_runtime_uv_center: false
  use_tgt_runtime_uv_center: false
  uv_center_n_bins: 64
  uv_center_source: owned
  uv_center_min_count: 20
  uv_center_smooth_s: 2.0
  uv_center_robust: median
  uv_center_debug: true
  # Main correction: geometric snug field
  auto_avatar_snug_field: true 
  snug_field_n_s: 12
  snug_field_n_theta: 48
  snug_surface_band: 0.01
  snug_target_gap: 0.01
  snug_gain: 3.0
  snug_min_scale: 0.7
  snug_max_scale: 1.1
  snug_min_count: 6
  snug_smooth_s: 0.75
  snug_smooth_theta: 0.75
  snug_debug: true
  snug_mode: multiplicative  
  snug_delta_in_max: 0.004    # ~ a couple of voxels
  snug_delta_out_max: 0.008
  detail_avatar_gate: true
  detail_clearance: 0.0005
  detail_band: 0.004

  final_carve: true
  carve_c0: 0.0002
  carve_k_bulge: 0.0          # start at 0; raise to 0.0025 if bulges still poke through
  #snug_penetration_guard: false
  #snug_guard_min_scale: 0.9
  snug_penetration_guard: false
  snug_penetration_clearance: 0.0001
  snug_pushout_scale: 1.02
  # Disable these in first test
  accessory_offset_mode: local
  use_soft_snug: true
  local_offset_strength: 0.3
  local_offset_band: 0.012
  local_offset_gate_sigma: 0.01
  use_hard_avatar_clamp: true
  hard_clearance: 0.00001
  avatar_clearance: 0.00001
  cut_avatar: true 
  use_adaptive_shell_thinning: false
  shell_thin_mode: soft
  shell_inner_clearance: 0.015
  shell_thin_strength: 0.8
  shell_avatar_band: 0.015
  shell_sdf_band: -1.0
  shell_thin_debug: true





